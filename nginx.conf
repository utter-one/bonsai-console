server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # VitePress docs — static site, no SPA fallback needed
    location /help/ {
        try_files $uri $uri/ /help/404.html;
    }

    # Main Vue SPA — fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
